<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>附近配對成功</title>
   <style>
    /* 基础重置 */
    * { box-sizing: border-box; }
    
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background-color: #7494c0; 
        margin: 0; 
        padding: 0; 
        display: flex; 
        flex-direction: column;
        /* 修复手机端100vh问题 */
        height: 100vh; 
        height: -webkit-fill-available; 
        overflow: hidden; 
    }

    html {
        height: -webkit-fill-available;
    }

    /* 容器调整：高度设为100%，去掉固定高度 */
    .chat-container { 
        width: 100%; 
        max-width: 500px; 
        background: #84a2d4; 
        display: flex; 
        flex-direction: column; 
        height: 100%; 
        margin: 0 auto;
        position: relative;
    }
    
    .header { 
        background: #2c3e50; 
        color: white; 
        padding: 15px; 
        text-align: center; 
        font-weight: bold; 
        flex-shrink: 0; /* 确保头部不被压缩 */
    }
    
    /* 聊天区域：自动撑开，并留出底部按钮的空位 */
    .chat-content { 
        padding: 15px; 
        flex: 1; 
        overflow-y: auto; 
        display: flex; 
        flex-direction: column; 
        gap: 15px; 
        -webkit-overflow-scrolling: touch; /* 增加iOS滑动流畅度 */
        padding-bottom: 100px; /* 重要：防止内容被底部按钮挡住 */
    }

    .msg-row { display: flex; align-items: flex-start; animation: fadeIn 0.5s ease forwards; opacity: 0; }
    .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 8px; flex-shrink: 0; }
    .msg-bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 16px; background: white; border-top-left-radius: 2px; position: relative; }
    .content-img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }

    /* 底部按钮区：固定在底部，确保可见 */
    .btn-area { 
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 15px; 
        background: rgba(255, 255, 255, 0.9); 
        backdrop-filter: blur(10px); /* 磨砂效果增加高级感 */
        border-top: 1px solid #ddd;
    }
    
    .line-btn { 
        background: #00b900; 
        color: white; 
        text-decoration: none; 
        width: 100%; 
        padding: 15px 0; 
        border-radius: 50px; 
        font-weight: bold; 
        font-size: 1.2rem; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        animation: pulse 2s infinite; 
        box-shadow: 0 4px 15px rgba(0,185,0,0.3);
    }
    .line-btn img { width: 26px; margin-right: 10px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
</style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <span>❮ 返回</span>
            <span>Miya (在线)</span>
            <span>☰</span>
        </div>
        
        <div class="chat-content">
            <div class="msg-row">
                <img src="avatar.jpg" class="avatar"> <div class="msg-bubble">約嗎？哥哥一夜情可以直接約見面的喔</div>
                <div class="msg-info">下午2:30</div>
            </div>

            <div class="msg-row">
                <img src="avatar.jpg" class="avatar">
                <div class="msg-bubble">哥哥哪裡人幾歲啦？</div>
                <div class="msg-info">下午2:30</div>
            </div>

            <div class="msg-row">
                <img src="avatar.jpg" class="avatar">
                <div class="msg-bubble">
                    這麼巧，附近正好有妹妹配對
                    <img src="beauty.jpg" class="content-img"> </div>
                <div class="msg-info">下午2:31</div>
            </div>

            <div class="msg-row">
                <img src="avatar.jpg" class="avatar">
                <div class="msg-bubble">添加以後主動打招呼了解喔 👇</div>
                <div class="msg-info">下午2:31</div>
            </div>
        </div>

        <div class="btn-area">
            <a href="https://line.me/ti/p/~你的ID" class="line-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg"> 點擊加賴約哥哥
            </a>
        </div>
    </div>

</body>
</html>
